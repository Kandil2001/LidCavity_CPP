<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" width="980" height="560" role="img" aria-label="Refined grid validation summary for the C++ lid driven cavity solver">
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#24292f">Refined-grid validation summary</text>
  <text x="490" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#57606a">N = 128, central differencing, RBSOR pressure correction</text>

  <g font-family="Arial, sans-serif">
    <rect x="55" y="110" width="270" height="185" rx="18" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="190" y="145" text-anchor="middle" font-size="23" font-weight="700" fill="#0969da">Re = 100</text>
    <text x="190" y="177" text-anchor="middle" font-size="15" fill="#57606a">Best agreement case</text>
    <text x="92" y="220" font-size="17" fill="#24292f">Ghia u L2</text>
    <text x="275" y="220" text-anchor="end" font-size="17" font-weight="700" fill="#24292f">0.0031</text>
    <text x="92" y="252" font-size="17" fill="#24292f">Ghia v L2</text>
    <text x="275" y="252" text-anchor="end" font-size="17" font-weight="700" fill="#24292f">0.0041</text>
    <rect x="92" y="267" width="183" height="11" rx="6" fill="#2da44e"/>
    <text x="190" y="318" text-anchor="middle" font-size="14" fill="#2da44e" font-weight="700">passed selected threshold</text>

    <rect x="355" y="110" width="270" height="185" rx="18" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="490" y="145" text-anchor="middle" font-size="23" font-weight="700" fill="#0969da">Re = 400</text>
    <text x="490" y="177" text-anchor="middle" font-size="15" fill="#57606a">Refined-grid validation</text>
    <text x="392" y="220" font-size="17" fill="#24292f">Ghia u L2</text>
    <text x="575" y="220" text-anchor="end" font-size="17" font-weight="700" fill="#24292f">0.0539</text>
    <text x="392" y="252" font-size="17" fill="#24292f">Ghia v L2</text>
    <text x="575" y="252" text-anchor="end" font-size="17" font-weight="700" fill="#24292f">0.0652</text>
    <rect x="392" y="267" width="183" height="11" rx="6" fill="#2da44e"/>
    <text x="490" y="318" text-anchor="middle" font-size="14" fill="#2da44e" font-weight="700">passed selected threshold</text>

    <rect x="655" y="110" width="270" height="185" rx="18" fill="#f6f8fa" stroke="#d0d7de"/>
    <text x="790" y="145" text-anchor="middle" font-size="23" font-weight="700" fill="#0969da">Re = 1000</text>
    <text x="790" y="177" text-anchor="middle" font-size="15" fill="#57606a">High-Re case</text>
    <text x="692" y="220" font-size="17" fill="#24292f">Ghia u L2</text>
    <text x="875" y="220" text-anchor="end" font-size="17" font-weight="700" fill="#24292f">0.1102</text>
    <text x="692" y="252" font-size="17" fill="#24292f">Ghia v L2</text>
    <text x="875" y="252" text-anchor="end" font-size="17" font-weight="700" fill="#24292f">0.1109</text>
    <rect x="692" y="267" width="183" height="11" rx="6" fill="#2da44e"/>
    <text x="790" y="318" text-anchor="middle" font-size="14" fill="#2da44e" font-weight="700">passed selected threshold</text>
  </g>

  <g font-family="Arial, sans-serif">
    <text x="55" y="370" font-size="22" font-weight="700" fill="#24292f">What is worth showing?</text>
    <text x="55" y="402" font-size="16" fill="#24292f">The refined-grid results tell the strongest story: all 12 cases with N = 128 passed the selected Ghia validation threshold.</text>
    <text x="55" y="431" font-size="16" fill="#24292f">RBSOR kept the validation errors nearly unchanged compared with RBGS while reducing the pressure-solver cost strongly.</text>

    <rect x="55" y="462" width="390" height="20" rx="10" fill="#d0d7de"/>
    <rect x="55" y="462" width="86" height="20" rx="10" fill="#fb8500"/>
    <text x="462" y="478" font-size="15" fill="#24292f">RBGS mean runtime: 790.2 s</text>

    <rect x="55" y="505" width="390" height="20" rx="10" fill="#d0d7de"/>
    <rect x="55" y="505" width="390" height="20" rx="10" fill="#2da44e"/>
    <text x="462" y="521" font-size="15" fill="#24292f">RBSOR mean runtime: 176.6 s  → about 4.5× faster</text>
  </g>
</svg>
